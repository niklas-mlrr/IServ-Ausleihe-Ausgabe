<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bücherausgabe</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="/html5-qrcode.min.js"></script>
  <script src="/common.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Dark als Default; Light greift, wenn Browser/System es vorgeben
       (prefers-color-scheme folgt zuerst dem Browser-Override, sonst dem System). */
    :root {
      color-scheme: light dark;
      --bg:#0f0f0f; --fg:#fff; --surface:#1e1e1e; --surface-2:#2a2a2a;
      --surface-4:#4a4a4a; --dropdown:#1c1c1e; --border:#333; --shadow:rgba(0,0,0,.5);
      /* Quadratische Steuerbuttons (Hilfe/Zahnrad/Torch/Ton) – skaliert mit der
         Viewport-Breite, aber gedeckelt. Statuszeile = 2/3 dieser Höhe. */
      --btn: clamp(52px, 14vw, 88px);
      --gap: 8px;
      --status-h: calc(var(--btn) * 2 / 3);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f2f2f7; --fg:#1c1c1e; --surface:#fff; --surface-2:#e5e5ea;
        --surface-4:#c7c7cc; --dropdown:#fff; --border:#d0d0d5; --shadow:rgba(0,0,0,.18);
      }
    }
    body {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--fg); height: 100dvh; overflow: hidden;
      max-width: 742.5px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center; padding: 7px;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; opacity: .85; }
    .view { display: none; width: 100%; flex-direction: column; align-items: center; }
    .view.show { display: flex; }
    /* Active-View füllt die Höhe, damit nur die Tabelle scrollt */
    #view-active.show { flex: 1 1 auto; min-height: 0; align-items: stretch; }
    /* Pending-View: volle verbleibende Höhe, Inhalt mittig */
    #view-pending.show { flex: 1 1 auto; justify-content: center; }
    /* Pairing */
    .pair-hint { opacity: .7; text-align: center; margin-bottom: 12px; }
    .pair-code {
      font-size: 4.5rem; font-weight: 700; letter-spacing: .25em;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      background: var(--surface); border-radius: 16px; padding: 16px 28px; margin: 8px 0 16px;
    }
    .spinner { opacity: .5; font-size: .9rem; }

    /* ---- Obere Leiste: Zahnrad | Kamera | Torch/Sound (52 + 7 + 610.5 + 7 + 52 px) ---- */
    .top-bar { display: flex; gap: 7px; align-items: flex-start; width: 100%; }
    .gear-wrap { position: relative; display: flex; flex-direction: column; gap: 7px; width: 52px; }
    .gear-wrap button { width: 52px; height: 52px; }
    #reader {
      flex: 1 1 auto; min-width: 0; max-width: 610.5px; height: 111px;
      border-radius: 12px; overflow: hidden; background: #000;
      box-shadow: 0 0 0 0 #4caf50; transition: box-shadow .6s ease-out;
      /* Kamerabild stets formatfüllend und mittig zentriert */
      display: flex; align-items: center; justify-content: center;
    }
    /* Video (und ein evtl. von html5-qrcode eingefügtes Canvas) füllt das Feld
       komplett aus und wird mittig beschnitten — keine Ränder, kein Versatz. */
    #reader video, #reader canvas {
      width: 100% !important; height: 100% !important;
      object-fit: cover; object-position: center center;
      margin: auto !important; left: 0 !important; top: 0 !important;
    }
    #reader.scan-success { box-shadow: 0 0 0 3px #4caf50; transition: none; }
    .right-col { display: flex; flex-direction: column; gap: 7px; width: 52px; }
    .right-col button { width: 52px; height: 52px; font-size: 1.4rem; }

    button, select { border: none; border-radius: 8px; background: var(--surface-2); color: var(--fg); font-size: .95rem; cursor: pointer; }
    button:active { background: var(--surface-4); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #gear-btn, #help-btn { font-size: 1.5rem; }
    .torch-on, .sound-on { background: #4caf50 !important; }

    /* ---- Kamera-Dropdown (über Zahnrad) ---- */
    .cam-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 30;
      display: none; width: 240px; background: var(--dropdown); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; box-shadow: 0 8px 24px var(--shadow);
    }
    .cam-dropdown.open { display: flex; gap: 8px; }
    .cam-dropdown select { flex: 1; padding: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cam-dropdown #reload-btn { padding: 10px 12px; font-size: 1.1rem; }

    /* ---- Statuszeile (volle Breite, 2/3 der Buttonhöhe) ---- */
    #status {
      box-sizing: border-box;
      margin-top: 7px; padding: 8px 14px; border-radius: 8px; font-size: .9rem;
      background: var(--surface); width: 100%; max-width: 728.5px;
      display: flex; align-items: center; justify-content: center;
      white-space: normal; overflow-wrap: normal; word-break: normal; text-align: center;
    }
    .dot { display: none; }
    .dot.ok { background: #4caf50; } .dot.err { background: #f44336; }
    /* Rote Alert-Status (ausgemustert, anderweitig verliehen, unbekannt,
       Prüf-Fehler) — dieselbe Farbe wie die jeweilige Modal-Überschrift
       (s. ALERT_META_STUDENT in student.js / statusAlertClass()). */
    #status-text.status-alert-red { color: #f44336; font-weight: 700; }
    /* Buch erfolgreich ausgegeben (booked) — grün, nur für diese Meldung. */
    #status-text.status-book-issued { color: #2e7d32; font-weight: 700; }
    /* Orange Alert-Status (bereits an dich verliehen, nicht bestellt,
       Buchliste noch nicht geladen) — dieselbe Farbe wie die Modal-Überschrift. */
    #status-text.status-alert-orange { color: #e69500; font-weight: 700; }

    /* ---- Name (groß, ohne Box) + Klasse/Bezahlstatus rechtsbündig ---- */
    .name-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin: 12px 2px 8px; width: 100%; }
    .s-name { font-size: 1.5rem; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.2; }
    .s-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
    .s-form { font-size: 1rem; font-weight: 700; line-height: 1.2; }
    .s-pay  { font-size: .85rem; opacity: .9; text-align: right; }
    .pay-badge { font-weight: 600; }
    .pay-badge.paid { color: #4caf50; }
    .pay-badge.unpaid { color: #e69500; }
    .pay-badge.override { color: #0a84ff; }
    .pay-badge.wait { color: #888; }

    /* ---- Bücher-Tabelle (einziger Scroll-Bereich) ---- */
    .book-table-wrap { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; width: 100%; }
    .book-row {
      display: grid; grid-template-columns: 5rem 1fr 1.8rem; align-items: center;
      gap: 8px; padding: 8px 10px; margin-bottom: 6px; color: var(--fg);
      border-radius: 8px; border: 2px solid transparent; font-size: .9rem;
      /* FLIP-Animation: nach einem erfolgreichen Scan wandern die Zeilen an
         ihre neue Position, statt sofort zu springen. transform wird nur
         während der Animation gesetzt; ohne Animation bleibt die Zeile ruhig. */
      position: relative;
      transition: transform .5s cubic-bezier(.22, .61, .36, 1);
    }
    .book-row .b-fach { font-weight: 600; }
    .book-row .b-title { overflow: hidden; text-overflow: ellipsis; }
    .book-row .b-icon { text-align: center; font-size: 1.1rem; }
    /* Transparenter Hintergrund, Farbe nur dezent (faint tint + Rand) — in beiden Themes lesbar. */
    .row-vorgemerkt  { background: rgba(230,126,34,.14); border-color: rgba(230,126,34,.55); }
    .row-ausgeliehen { background: rgba(46,125,50,.16);  border-color: rgba(46,125,50,.55); }
    .book-empty { opacity: .4; padding: 14px 4px; font-size: .9rem; }
    /* Bewegungsreduktion respektieren: FLIP-Transition praktisch sofort. */
    @media (prefers-reduced-motion: reduce) {
      .book-row { transition: transform .01ms !important; }
    }

    #finish-btn { margin-top: 10px; width: 100%; background: #30d158; color: #000; font-weight: 600; font-size: 1.05rem; padding: 14px; }

    /* ---- Ausgemustertes-Buch-Hinweis (Modal) ---- */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100; padding: 20px;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.55);
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      width: 100%; max-width: 420px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px; padding: 20px;
      box-shadow: 0 12px 40px var(--shadow);
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-box h3 { font-size: 1.2rem; font-weight: 700; color: #f44336; }
    .modal-box p { font-size: .95rem; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .modal-actions button { padding: 12px; font-size: .95rem; width: 100%; background: #2e7d32; color: #fff; }

    /* Done / Error */
    .big-msg { text-align: center; margin-top: 60px; }
    .big-msg .icon { font-size: 3rem; margin-bottom: 12px; }
    /* minimalistische Inline-Icons (Lucide-Stil) — skalieren mit der Schriftgröße */
    .ico { width: 1em; height: 1em; vertical-align: -0.125em; flex: none; }
    .big-msg .title { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
    .big-msg .text { opacity: .6; }
  </style>
</head>
<body>
  <!-- Pairing: 4-stelligen Code dem Betreuer zeigen -->
  <div class="view" id="view-pending">
    <h1>Bücherausgabe</h1>
    <p class="pair-hint">Zeige diesen Code dem Betreuer am Host:</p>
    <div class="pair-code" id="pair-code">····</div>
    <p class="spinner" id="pending-status">Warte auf Freigabe…</p>
  </div>

  <!-- Aktiv: Scanner + Bücher-Tabelle -->
  <div class="view" id="view-active">
    <div class="top-bar">
      <div class="gear-wrap">
        <button id="help-btn" title="Hilfe">?</button>
        <button id="gear-btn" title="Einstellungen / Kamera"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <div class="cam-dropdown" id="cam-dropdown">
          <select id="camera-select"><option>Kameras laden…</option></select>
          <button id="reload-btn" title="Kamera neu laden"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
        </div>
      </div>
      <div id="reader"></div>
      <div class="right-col">
        <button id="torch-btn" title="Taschenlampe"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6c0 2-2 2-2 4v10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V10c0-2-2-2-2-4V2h12z"/><path d="M6 6h12"/><path d="M12 12h.01"/></svg></button>
        <button id="sound-btn" title="Scan-Ton"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></button>
      </div>
    </div>
    <div id="status"><span class="dot" id="dot"></span><span id="status-text">Verbinde…</span></div>
    <div class="name-row">
      <div class="s-name" id="s-name">–</div>
      <div class="s-meta">
        <div class="s-form" id="s-form"></div>
        <div class="s-pay" id="s-pay"></div>
      </div>
    </div>
    <div class="book-table-wrap">
      <div id="book-rows"></div>
    </div>
    <button id="finish-btn">Fertig — Vorgang abschließen</button>
  </div>

  <!-- Buch-Hinweis-Modal. Bei ausgemustert / verliehen-an-andere: bewusst
       OHNE Schließen-Button und ohne Klick-außerhalb-schließt — nur der Host
       darf dieses Fenster (per Button im Now-Serving-Kästchen) freigeben
       (server: book_alert_open blockiert weitere Scans). Bei „an sich selbst
       verliehen" (series_already_lent): nur ein Hinweis, den der Schüler selbst
       per Schließen-Button (oder nächster Scan) schließt — kein Host-Bezug. -->
  <div class="modal-overlay" id="book-alert-modal">
    <div class="modal-box">
      <h3 id="book-alert-title">Buch-Hinweis</h3>
      <p id="book-alert-text" style="opacity:.6;font-size:.85rem"></p>
      <p id="book-alert-note" hidden style="opacity:.6;font-size:.85rem"></p>
      <p id="book-alert-hint"></p>
      <div class="modal-actions" id="book-alert-actions" style="display:none">
        <button id="book-alert-close">Schließen</button>
      </div>
    </div>
  </div>

  <!-- Abgeschlossen (neutral, keine Daten) -->
  <div class="view" id="view-done">
    <div class="big-msg">
      <div class="icon"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg></div>
      <div class="title">Vorgang abgeschlossen</div>
      <div class="text">Du kannst dieses Fenster schließen.</div>
    </div>
  </div>

  <!-- Fehler -->
  <div class="view" id="view-error">
    <div class="big-msg">
      <div class="icon"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></div>
      <div class="title" id="error-title">Kein gültiger Zugang</div>
      <div class="text" id="error-text">Bitte scanne den QR-Code am Display erneut.</div>
    </div>
  </div>

  <script src="/student.js"></script>
</body>
</html>
