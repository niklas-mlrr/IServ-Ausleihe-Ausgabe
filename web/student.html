<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bücherausgabe</title>
  <script src="/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Dark als Default; Light greift, wenn Browser/System es vorgeben
       (prefers-color-scheme folgt zuerst dem Browser-Override, sonst dem System). */
    :root {
      color-scheme: light dark;
      --bg:#0f0f0f; --fg:#fff; --surface:#1e1e1e; --surface-2:#2a2a2a;
      --surface-4:#4a4a4a; --dropdown:#1c1c1e; --border:#333; --shadow:rgba(0,0,0,.5);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f2f2f7; --fg:#1c1c1e; --surface:#fff; --surface-2:#e5e5ea;
        --surface-4:#c7c7cc; --dropdown:#fff; --border:#d0d0d5; --shadow:rgba(0,0,0,.18);
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--fg); height: 100dvh; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; padding: 12px;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; opacity: .85; }
    .view { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; }
    .view.show { display: flex; }
    /* Active-View füllt die Höhe, damit nur die Tabelle scrollt */
    #view-active.show { flex: 1 1 auto; min-height: 0; align-items: stretch; }
    /* Pairing */
    .pair-hint { opacity: .7; text-align: center; margin-bottom: 12px; }
    .pair-code {
      font-size: 4.5rem; font-weight: 700; letter-spacing: .25em;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      background: var(--surface); border-radius: 16px; padding: 16px 28px; margin: 8px 0 16px;
    }
    .spinner { opacity: .5; font-size: .9rem; }

    /* ---- Obere Leiste: Zahnrad | Kamera | Torch/Sound ---- */
    .top-bar { display: flex; gap: 8px; align-items: stretch; width: 100%; }
    .gear-wrap { position: relative; display: flex; }
    #reader {
      flex: 1; height: 120px; border-radius: 12px; overflow: hidden; background: #000;
      box-shadow: 0 0 0 0 #4caf50; transition: box-shadow .6s ease-out;
    }
    #reader video { width: 100%; height: 100%; object-fit: cover; }
    #reader.scan-success { box-shadow: 0 0 0 3px #4caf50; transition: none; }
    .right-col { display: flex; flex-direction: column; gap: 8px; width: 52px; }
    .right-col button { flex: 1; font-size: 1.4rem; }

    button, select { border: none; border-radius: 8px; background: var(--surface-2); color: var(--fg); font-size: .95rem; cursor: pointer; }
    button:active { background: var(--surface-4); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #gear-btn { width: 52px; font-size: 1.5rem; }
    .torch-on, .sound-on { background: #4caf50 !important; }

    /* ---- Kamera-Dropdown (über Zahnrad) ---- */
    .cam-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 30;
      display: none; width: 240px; background: var(--dropdown); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; box-shadow: 0 8px 24px var(--shadow);
    }
    .cam-dropdown.open { display: flex; gap: 8px; }
    .cam-dropdown select { flex: 1; padding: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cam-dropdown #reload-btn { padding: 10px 12px; font-size: 1.1rem; }

    /* ---- Statuszeile (volle Breite) ---- */
    #status {
      margin-top: 10px; padding: 9px 14px; border-radius: 8px; font-size: .9rem;
      background: var(--surface); width: 100%; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dot { display: none; }
    .dot.ok { background: #4caf50; } .dot.err { background: #f44336; }

    /* ---- Name (groß, ohne Box) + Klasse/Bezahlstatus rechtsbündig ---- */
    .name-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin: 12px 2px 8px; width: 100%; }
    .s-name { font-size: 1.5rem; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.2; }
    .s-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
    .s-form { font-size: 1rem; font-weight: 700; line-height: 1.2; }
    .s-pay  { font-size: .85rem; opacity: .9; text-align: right; }
    .pay-badge { font-weight: 600; }
    .pay-badge.paid { color: #4caf50; }
    .pay-badge.unpaid { color: #e69500; }
    .pay-badge.override { color: #0a84ff; }

    /* ---- Bücher-Tabelle (einziger Scroll-Bereich) ---- */
    .book-table-wrap { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; width: 100%; }
    .book-row {
      display: grid; grid-template-columns: 5rem 1fr 1.8rem; align-items: center;
      gap: 8px; padding: 8px 10px; margin-bottom: 6px; color: var(--fg);
      border-radius: 8px; border: 2px solid transparent; font-size: .9rem;
    }
    .book-row .b-fach { font-weight: 600; }
    .book-row .b-title { overflow: hidden; text-overflow: ellipsis; }
    .book-row .b-icon { text-align: center; font-size: 1.1rem; }
    /* Transparenter Hintergrund, Farbe nur dezent (faint tint + Rand) — in beiden Themes lesbar. */
    .row-vorgemerkt  { background: rgba(230,126,34,.14); border-color: rgba(230,126,34,.55); }
    .row-ausgeliehen { background: rgba(46,125,50,.16);  border-color: rgba(46,125,50,.55); }
    .book-empty { opacity: .4; padding: 14px 4px; font-size: .9rem; }

    #finish-btn { margin-top: 10px; width: 100%; background: #30d158; color: #000; font-weight: 600; font-size: 1.05rem; padding: 14px; }

    /* Done / Error */
    .big-msg { text-align: center; margin-top: 60px; }
    .big-msg .icon { font-size: 3rem; margin-bottom: 12px; }
    .big-msg .title { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
    .big-msg .text { opacity: .6; }
  </style>
</head>
<body>
  <h1>Bücherausgabe</h1>

  <!-- Pairing: 4-stelligen Code dem Betreuer zeigen -->
  <div class="view" id="view-pending">
    <p class="pair-hint">Zeige diesen Code dem Betreuer am Host:</p>
    <div class="pair-code" id="pair-code">····</div>
    <p class="spinner" id="pending-status">Warte auf Freigabe…</p>
  </div>

  <!-- Aktiv: Scanner + Bücher-Tabelle -->
  <div class="view" id="view-active">
    <div class="top-bar">
      <div class="gear-wrap">
        <button id="gear-btn" title="Einstellungen / Kamera">&#x2699;</button>
        <div class="cam-dropdown" id="cam-dropdown">
          <select id="camera-select"><option>Kameras laden…</option></select>
          <button id="reload-btn" title="Kamera neu laden">&#x21BA;</button>
        </div>
      </div>
      <div id="reader"></div>
      <div class="right-col">
        <button id="torch-btn" title="Taschenlampe">&#x1F526;</button>
        <button id="sound-btn" title="Scan-Ton">&#x1F507;</button>
      </div>
    </div>
    <div id="status"><span class="dot" id="dot"></span><span id="status-text">Verbinde…</span></div>
    <div class="name-row">
      <div class="s-name" id="s-name">–</div>
      <div class="s-meta">
        <div class="s-form" id="s-form"></div>
        <div class="s-pay" id="s-pay"></div>
      </div>
    </div>
    <div class="book-table-wrap">
      <div id="book-rows"></div>
    </div>
    <button id="finish-btn">Fertig — Vorgang abschließen</button>
  </div>

  <!-- Abgeschlossen (neutral, keine Daten) -->
  <div class="view" id="view-done">
    <div class="big-msg">
      <div class="icon">✓</div>
      <div class="title">Vorgang abgeschlossen</div>
      <div class="text">Du kannst dieses Fenster schließen.</div>
    </div>
  </div>

  <!-- Fehler -->
  <div class="view" id="view-error">
    <div class="big-msg">
      <div class="icon">⚠</div>
      <div class="title" id="error-title">Kein gültiger Zugang</div>
      <div class="text" id="error-text">Bitte scanne den QR-Code am Display erneut.</div>
    </div>
  </div>

  <script>
    const views = {
      pending: document.getElementById('view-pending'),
      active: document.getElementById('view-active'),
      done: document.getElementById('view-done'),
      error: document.getElementById('view-error'),
    };
    function show(name) {
      for (const k in views) views[k].classList.toggle('show', k === name);
      const h1 = document.querySelector('h1');
      if (h1) h1.style.display = name === 'active' ? 'none' : '';
    }
    // IServ-Strings (Buchtitel etc.) nie ungefiltert per innerHTML einsetzen.
    function escapeHtml(v) {
      return String(v ?? '').replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    const joinSecret = new URLSearchParams(location.search).get('j');
    let token = sessionStorage.getItem('mb_token');
    let ws = null, finished = false, scannerStarted = false, reconnectDelay = 2000;

    function showError(title, text) {
      if (title) document.getElementById('error-title').textContent = title;
      if (text) document.getElementById('error-text').textContent = text;
      show('error');
    }
    function clearToken() { token = null; sessionStorage.removeItem('mb_token'); }

    async function join() {
      if (!joinSecret) { showError('Kein QR-Code', 'Bitte scanne den QR-Code am Display.'); return false; }
      try {
        const r = await fetch('/api/student/join', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ join_secret: joinSecret }),
        });
        if (!r.ok) {
          showError('Ausgabe geschlossen', 'Die Live-Ausgabe ist derzeit nicht geöffnet.');
          return false;
        }
        const d = await r.json();
        token = d.session_token;
        sessionStorage.setItem('mb_token', token);
        document.getElementById('pair-code').textContent = d.pairing_code;
        return true;
      } catch (_) {
        showError('Verbindungsfehler', 'Bitte erneut versuchen.');
        return false;
      }
    }

    function connect() {
      ws = new WebSocket(`wss://${location.host}/ws/student/${token}`);
      ws.onopen = () => { document.getElementById('dot').className = 'dot ok'; reconnectDelay = 2000; };
      ws.onmessage = e => { let m; try { m = JSON.parse(e.data); } catch (_) { return; } handleServerMessage(m); };
      ws.onerror = () => { document.getElementById('dot').className = 'dot err'; };
      ws.onclose = async (e) => {
        document.getElementById('dot').className = 'dot err';
        if (finished) return;                       // regulär abgeschlossen
        if (e.code === 4006) {                       // Token ungültig/entwertet
          clearToken();
          if (joinSecret) { if (await join()) connect(); }
          else show('done');
          return;
        }
        document.getElementById('status-text').textContent = 'Getrennt — neu verbinden…';
        setTimeout(connect, reconnectDelay);         // Netzproblem → erneut (mit Backoff)
        reconnectDelay = Math.min(Math.round(reconnectDelay * 1.6), 30000);  // Cap 30 s
      };
    }

    function handleServerMessage(msg) {
      if (msg.type === 'pending') {
        document.getElementById('pair-code').textContent = msg.pairing_code;
        show('pending');
      } else if (msg.type === 'student_info') {
        renderStudent(msg.student, msg.payment_overridden);
        show('active');
        startScanner();
      } else if (msg.type === 'scan_result') {
        document.getElementById('status-text').textContent =
          `${escapeHtml(msg.barcode)} — ${escapeHtml(msg.msg || msg.status)}`;
      } else if (msg.type === 'closed') {
        finished = true; clearToken(); show('done');
      } else if (msg.type === 'error') {
        document.getElementById('status-text').textContent = 'Fehler: ' + (msg.msg || '');
      }
    }

    function renderStudent(s, overridden) {
      document.getElementById('s-name').textContent = `${s.lastname}, ${s.firstname}`;
      document.getElementById('s-form').textContent = (s.form || '').replace(/^Klasse\s+/i, '');
      const pay = document.getElementById('s-pay');
      if (!s.enrolled) {
        pay.innerHTML = '<span class="pay-badge unpaid">Nicht angemeldet</span>';
      } else if (s.paid) {
        pay.innerHTML = '<span class="pay-badge paid">Bezahlt</span>';
      } else if (overridden) {
        pay.innerHTML = `<span class="pay-badge override">Vom Betreuer freigegeben</span> · offen: ${escapeHtml(s.amount_open)} €`;
      } else {
        pay.innerHTML = `<span class="pay-badge unpaid">Nicht bezahlt — offen: ${escapeHtml(s.amount_open)} €</span>`;
      }
      renderBooks(s.books);
    }

    function renderBooks(books) {
      const rows = document.getElementById('book-rows');
      if (!books || !books.length) {
        rows.innerHTML = '<div class="book-empty">Keine Bücher hinterlegt</div>';
        return;
      }
      rows.innerHTML = books.map(b => {
        const icon = b.status === 'ausgeliehen' ? '✓' : '⏳';
        const cls = b.status === 'ausgeliehen' ? 'ausgeliehen' : 'vorgemerkt';
        return `<div class="book-row row-${cls}">`
          + `<div class="b-fach">${escapeHtml(b.subject)}</div>`
          + `<div class="b-title">${escapeHtml(b.title)}</div>`
          + `<div class="b-icon">${icon}</div></div>`;
      }).join('');
    }

    // ---- Finish ----
    document.getElementById('finish-btn').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'finish' }));
    });

    // ================= Scanner (aus scan.html übernommen) =================
    let lastValue = '', cooldown = false, html5QrCode = null, currentCameraId = null,
        isTorchOn = false, isRestarting = false, soundEnabled = false;
    const statusEl = document.getElementById('status-text');
    const cameraSelect = document.getElementById('camera-select');
    const torchBtn = document.getElementById('torch-btn');
    const soundBtn = document.getElementById('sound-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const gearBtn = document.getElementById('gear-btn');
    const camDropdown = document.getElementById('cam-dropdown');
    const readerEl = document.getElementById('reader');
    let scanFlashTimeout = null, audioCtx = null, audioBuffer = null;

    // Zahnrad: Kamera-Dropdown auf/zu
    gearBtn.addEventListener('click', (e) => { e.stopPropagation(); camDropdown.classList.toggle('open'); });
    camDropdown.addEventListener('click', (e) => e.stopPropagation());
    document.addEventListener('click', () => camDropdown.classList.remove('open'));

    async function initAudio() {
      if (audioBuffer) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const silence = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
      const silSrc = audioCtx.createBufferSource();
      silSrc.buffer = silence; silSrc.connect(audioCtx.destination); silSrc.start(0);
      await audioCtx.resume();
      const resp = await fetch('/beep.mp3');
      audioBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
    }
    function playBeep() {
      if (!audioCtx || !audioBuffer) return;
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer; src.connect(audioCtx.destination); src.start(0);
    }
    soundBtn.addEventListener('click', async () => {
      soundEnabled = !soundEnabled;
      soundBtn.innerHTML = soundEnabled ? '\u{1F50A}' : '\u{1F507}';
      soundBtn.classList.toggle('sound-on', soundEnabled);
      if (soundEnabled) { await initAudio(); playBeep(); }
    });

    function onScanSuccess(value) {
      if (cooldown || value === lastValue) return;
      if (soundEnabled) playBeep();
      lastValue = value; cooldown = true;
      setTimeout(() => { cooldown = false; lastValue = ''; }, 2000);
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'scan', value }));
      if (navigator.vibrate) navigator.vibrate(80);
      readerEl.classList.add('scan-success');
      clearTimeout(scanFlashTimeout);
      scanFlashTimeout = setTimeout(() => readerEl.classList.remove('scan-success'), 1200);
    }

    function startScanner() {
      if (scannerStarted) return;
      scannerStarted = true;
      Html5Qrcode.getCameras().then(cameras => {
        const preferred = cameras.find(c => /back dual wide/i.test(c.label))
          || cameras.find(c => /back/i.test(c.label)) || cameras[0];
        cameraSelect.innerHTML = cameras.map(c => `<option value="${c.id}" ${c === preferred ? 'selected' : ''}>${c.label}</option>`).join('');
        currentCameraId = preferred?.id;
        initScanner(currentCameraId);
      }).catch(() => { cameraSelect.innerHTML = '<option>Keine Kamera</option>'; cameraSelect.disabled = true; });
    }

    async function initScanner(cameraId) {
      if (isRestarting) return;
      isRestarting = true; reloadBtn.disabled = true; reloadBtn.textContent = '…';
      statusEl.textContent = 'Kamera startet…';
      if (html5QrCode) { try { await html5QrCode.stop(); } catch (e) {} try { html5QrCode.clear(); } catch (e) {} html5QrCode = null; }
      html5QrCode = new Html5Qrcode('reader');
      try {
        await html5QrCode.start(cameraId, { fps: 15, qrbox: { width: 260, height: 90 }, aspectRatio: 2.0 }, onScanSuccess, () => {});
        currentCameraId = cameraId; isTorchOn = false;
        torchBtn.classList.remove('torch-on');
        statusEl.textContent = 'Scanner bereit — Buch scannen';
        const video = document.querySelector('#reader video');
        if (video && video.srcObject) {
          const caps = video.srcObject.getVideoTracks()[0].getCapabilities?.();
          torchBtn.disabled = !(caps && caps.torch);
        }
      } catch (err) { statusEl.textContent = 'Kamerafehler — ↺ tippen'; document.getElementById('dot').className = 'dot err'; }
      reloadBtn.textContent = '↺'; reloadBtn.disabled = false; isRestarting = false;
    }

    cameraSelect.addEventListener('change', () => { initScanner(cameraSelect.value); camDropdown.classList.remove('open'); });
    reloadBtn.addEventListener('click', () => { if (currentCameraId) initScanner(currentCameraId); });
    torchBtn.addEventListener('click', async () => {
      const video = document.querySelector('#reader video');
      if (!video || !video.srcObject) return;
      const track = video.srcObject.getVideoTracks()[0];
      try { await track.applyConstraints({ advanced: [{ torch: !isTorchOn }] }); isTorchOn = !isTorchOn;
        torchBtn.classList.toggle('torch-on', isTorchOn); } catch (e) {}
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentCameraId && scannerStarted) setTimeout(() => initScanner(currentCameraId), 300);
    });
    setInterval(() => {
      if (document.hidden || isRestarting || !currentCameraId || !scannerStarted) return;
      const video = document.querySelector('#reader video');
      if (video && (video.paused || video.ended || video.readyState < 2)) initScanner(currentCameraId);
    }, 3000);

    // ================= Bootstrap =================
    (async function boot() {
      if (token) { connect(); }            // bestehender Token → verbinden (Server prüft Gültigkeit)
      else if (await join()) { connect(); } // sonst per QR-Secret neue Session
    })();
  </script>
</body>
</html>
