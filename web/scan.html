<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Barcode Scanner</title>
  <script src="/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Dark als Default; Light greift, wenn Browser/System es vorgeben
       (prefers-color-scheme folgt zuerst dem Browser-Override, sonst dem System). */
    :root {
      color-scheme: light dark;
      --bg:#0f0f0f; --fg:#fff; --surface:#1e1e1e; --surface-2:#2a2a2a;
      --surface-3:#3a3a3a; --surface-4:#4a4a4a; --dropdown:#1c1c1e;
      --border:#333; --shadow:rgba(0,0,0,.5);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f2f2f7; --fg:#1c1c1e; --surface:#fff; --surface-2:#e5e5ea;
        --surface-3:#d8d8dd; --surface-4:#c7c7cc; --dropdown:#fff;
        --border:#d0d0d5; --shadow:rgba(0,0,0,.18);
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .app {
      width: 100%; max-width: 420px; height: 100%;
      display: flex; flex-direction: column;
    }

    /* ---- Obere Leiste: Zahnrad | Kamera | Torch/Sound ---- */
    .top-bar { display: flex; gap: 8px; align-items: stretch; }
    .gear-wrap { position: relative; display: flex; }
    #reader {
      flex: 1; height: 120px; border-radius: 12px; overflow: hidden;
      box-shadow: 0 0 0 0 #4caf50; transition: box-shadow .6s ease-out;
      background: #000;
    }
    #reader video { width: 100%; height: 100%; object-fit: cover; }
    #reader.scan-success { box-shadow: 0 0 0 3px #4caf50; transition: none; }
    .right-col { display: flex; flex-direction: column; gap: 8px; width: 52px; }
    .right-col button { flex: 1; }

    button, select {
      border: none; border-radius: 8px; background: var(--surface-2); color: var(--fg);
      font-size: .95rem; cursor: pointer; transition: background .2s;
    }
    button:hover, select:hover { background: var(--surface-3); }
    button:active { background: var(--surface-4); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #gear-btn { width: 52px; font-size: 1.5rem; }
    .right-col button { font-size: 1.4rem; }
    .torch-on { background: #4caf50 !important; }
    .sound-on { background: #4caf50 !important; }

    /* ---- Kamera-Dropdown (über Zahnrad) ---- */
    .cam-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 30;
      display: none; width: 240px;
      background: var(--dropdown); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; box-shadow: 0 8px 24px var(--shadow);
    }
    .cam-dropdown.open { display: flex; gap: 8px; }
    .cam-dropdown select { flex: 1; padding: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cam-dropdown #reload-btn { padding: 10px 12px; font-size: 1.1rem; }

    /* ---- Statuszeile (volle Breite) ---- */
    #status {
      margin-top: 10px; padding: 9px 14px; border-radius: 8px;
      font-size: .9rem; background: var(--surface); text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #888; }
    .dot.ok { background: #4caf50; }
    .dot.err { background: #f44336; }

    /* ---- Name (groß, ohne Box) + Klasse/Bezahlstatus rechtsbündig ---- */
    .name-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 12px 2px 8px; }
    .s-name { font-size: 1.5rem; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.2; }
    .s-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
    .s-form { font-size: 1rem; font-weight: 700; line-height: 1.2; }
    .s-pay  { font-size: .85rem; opacity: .9; text-align: right; }
    .s-pay .paid   { color: #4caf50; }
    .s-pay .unpaid { color: #e69500; }
    .s-pay .wait   { color: #888; }

    /* ---- Bücher-Tabelle (einziger Scroll-Bereich) ---- */
    .book-table-wrap { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .book-row {
      display: grid; grid-template-columns: 5rem 1fr 1.8rem; align-items: center;
      gap: 8px; padding: 8px 10px; margin-bottom: 6px; color: var(--fg);
      border-radius: 8px; border: 2px solid transparent; font-size: .9rem;
    }
    .book-row .b-fach { font-weight: 600; }
    .book-row .b-title { overflow: hidden; text-overflow: ellipsis; }
    .book-row .b-icon { text-align: center; font-size: 1.1rem; }
    /* Transparenter Hintergrund, Farbe nur dezent (faint tint + Rand) — in beiden Themes lesbar. */
    .row-vorgemerkt  { background: rgba(230,126,34,.14); border-color: rgba(230,126,34,.55); }
    .row-ausgeliehen { background: rgba(46,125,50,.16);  border-color: rgba(46,125,50,.55); }
    .book-empty { opacity: .4; padding: 14px 4px; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div class="gear-wrap">
        <button id="gear-btn" title="Einstellungen / Kamera">&#x2699;</button>
        <div class="cam-dropdown" id="cam-dropdown">
          <select id="camera-select"><option>Kameras laden…</option></select>
          <button id="reload-btn" title="Kamera neu laden">&#x21BA;</button>
        </div>
      </div>
      <div id="reader"></div>
      <div class="right-col">
        <button id="torch-btn" title="Taschenlampe">&#x1F526;</button>
        <button id="sound-btn" title="Scan-Ton">&#x1F507;</button>
      </div>
    </div>

    <div id="status"><span class="dot" id="dot"></span><span id="status-text">Verbinde…</span></div>

    <div class="name-row">
      <div class="s-name" id="s-name">–</div>
      <div class="s-meta">
        <div class="s-form" id="s-form"></div>
        <div class="s-pay" id="s-pay"></div>
      </div>
    </div>

    <div class="book-table-wrap">
      <div id="book-rows"></div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status-text');
    const dotEl = document.getElementById('dot');
    const sNameEl = document.getElementById('s-name');
    const sFormEl = document.getElementById('s-form');
    const sPayEl = document.getElementById('s-pay');
    const bookRowsEl = document.getElementById('book-rows');
    let ws, reconnectDelay = 2000;

    // IServ-Strings nie ungefiltert per innerHTML einsetzen.
    function escapeHtml(v) {
      return String(v ?? '').replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    const token = new URLSearchParams(location.search).get('token');

    function renderBooks(books) {
      if (!books || !books.length) {
        bookRowsEl.innerHTML = '<div class="book-empty">Keine Bücher hinterlegt</div>';
        return;
      }
      bookRowsEl.innerHTML = books.map(b => {
        const icon = b.status === 'ausgeliehen' ? '✓' : '⏳';
        return `<div class="book-row row-${b.status === 'ausgeliehen' ? 'ausgeliehen' : 'vorgemerkt'}">`
          + `<div class="b-fach">${escapeHtml(b.subject)}</div>`
          + `<div class="b-title">${escapeHtml(b.title)}</div>`
          + `<div class="b-icon">${icon}</div></div>`;
      }).join('');
    }

    function handleServerMessage(msg) {
      if (msg.type === 'student_info') {
        const s = msg.student;
        sNameEl.textContent = `${s.lastname}, ${s.firstname}`;
        sFormEl.textContent = (s.form || '').replace(/^Klasse\s+/i, '');
        const paidClass = !s.enrolled ? 'wait' : s.paid ? 'paid' : 'unpaid';
        const paidText = !s.enrolled ? 'Nicht angemeldet' : s.paid ? 'Bezahlt' : `Offen: ${escapeHtml(s.amount_open)} €`;
        sPayEl.innerHTML = `<span class="${paidClass}">${paidText}</span>`;
        renderBooks(s.books);
        statusEl.textContent = 'Scanner bereit — Buch scannen';
      } else if (msg.type === 'scan_result') {
        statusEl.textContent = `${escapeHtml(msg.barcode)} — ${escapeHtml(msg.msg || msg.status)}`;
      } else if (msg.type === 'waiting') {
        sNameEl.textContent = '–';
        sFormEl.textContent = '';
        sPayEl.innerHTML = '';
        bookRowsEl.innerHTML = '';
        statusEl.textContent = msg.msg || 'Warte auf Schüler-Zuweisung';
      } else if (msg.type === 'error') {
        statusEl.textContent = 'Fehler: ' + (msg.msg || '');
        dotEl.className = 'dot err';
      }
    }

    function connect() {
      if (!token) {
        statusEl.textContent = 'Kein Token in der URL — vom Host QR-Code scannen';
        dotEl.className = 'dot err';
        return;
      }
      ws = new WebSocket(`wss://${location.host}/ws/scanner/${token}`);
      ws.onopen  = () => { dotEl.className = 'dot ok'; statusEl.textContent = 'Verbunden'; reconnectDelay = 2000; };
      ws.onclose = () => {
        dotEl.className = 'dot err'; statusEl.textContent = 'Getrennt — neu verbinden…';
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(Math.round(reconnectDelay * 1.6), 30000);  // Backoff, Cap 30 s
      };
      ws.onerror = () => { dotEl.className = 'dot err'; statusEl.textContent = 'Verbindungsfehler'; };
      ws.onmessage = e => { try { handleServerMessage(JSON.parse(e.data)); } catch (_) {} };
    }
    connect();

    let lastValue = '', cooldown = false, html5QrCode = null, currentCameraId = null, isTorchOn = false, isCameraRunning = false, isRestarting = false, soundEnabled = false;
    const cameraSelect = document.getElementById('camera-select');
    const torchBtn = document.getElementById('torch-btn');
    const soundBtn = document.getElementById('sound-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const gearBtn = document.getElementById('gear-btn');
    const camDropdown = document.getElementById('cam-dropdown');
    const readerEl = document.getElementById('reader');
    let scanFlashTimeout = null;

    let audioCtx = null, audioBuffer = null;

    async function initAudio() {
      if (audioBuffer) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Silent buffer to unlock iOS AudioContext during user gesture
      const silence = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
      const silSrc = audioCtx.createBufferSource();
      silSrc.buffer = silence; silSrc.connect(audioCtx.destination); silSrc.start(0);
      await audioCtx.resume();
      const response = await fetch('/beep.mp3');
      const arrayBuf = await response.arrayBuffer();
      audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
    }

    function playBeep() {
      if (!audioCtx || !audioBuffer) return;
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(audioCtx.destination);
      src.start(0);
    }

    soundBtn.addEventListener('click', async () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        soundBtn.innerHTML = '\u{1F50A}';
        soundBtn.classList.add('sound-on');
        await initAudio();
        playBeep();
      } else {
        soundBtn.innerHTML = '\u{1F507}';
        soundBtn.classList.remove('sound-on');
      }
    });

    // Zahnrad: Kamera-Dropdown auf/zu
    gearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      camDropdown.classList.toggle('open');
    });
    camDropdown.addEventListener('click', (e) => e.stopPropagation());
    document.addEventListener('click', () => camDropdown.classList.remove('open'));

    function onScanSuccess(value) {
      if (cooldown || value === lastValue) return;
      if (soundEnabled) playBeep();
      lastValue = value; cooldown = true;
      setTimeout(() => { cooldown = false; lastValue = ''; }, 2000);
      statusEl.textContent = 'Gesendet: ' + value;
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'scan', value }));
      if (navigator.vibrate) navigator.vibrate(80);
      readerEl.classList.add('scan-success');
      clearTimeout(scanFlashTimeout);
      scanFlashTimeout = setTimeout(() => readerEl.classList.remove('scan-success'), 1200);
    }

    // Load available cameras
    Html5Qrcode.getCameras().then(cameras => {
      const preferred =
        cameras.find(c => /back dual wide/i.test(c.label)) ||
        cameras.find(c => /back/i.test(c.label)) ||
        cameras[0];
      cameraSelect.innerHTML = cameras.map(c => `<option value="${c.id}" ${c === preferred ? 'selected' : ''}>${c.label}</option>`).join('');
      currentCameraId = preferred?.id;
      initScanner(currentCameraId);
    }).catch(err => {
      cameraSelect.innerHTML = '<option>Keine Kamera gefunden</option>';
      cameraSelect.disabled = true;
    });

    async function initScanner(cameraId) {
      if (isRestarting) return;
      isRestarting = true;
      isCameraRunning = false;
      reloadBtn.disabled = true;
      reloadBtn.textContent = '...';
      statusEl.textContent = 'Kamera startet…';

      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
        try { html5QrCode.clear(); } catch (e) {}
        html5QrCode = null;
      }

      html5QrCode = new Html5Qrcode('reader');
      try {
        await html5QrCode.start(
          cameraId,
          { fps: 15, qrbox: { width: 260, height: 90 }, aspectRatio: 2.0 },
          onScanSuccess,
          () => {}
        );
        isCameraRunning = true;
        currentCameraId = cameraId;
        isTorchOn = false;
        torchBtn.classList.remove('torch-on');
        statusEl.textContent = ws && ws.readyState === WebSocket.OPEN ? 'Scanner bereit' : 'Neu verbinden…';
        const video = document.querySelector('#reader video');
        if (video && video.srcObject) {
          const track = video.srcObject.getVideoTracks()[0];
          const capabilities = track.getCapabilities?.();
          torchBtn.disabled = !(capabilities && capabilities.torch);
        }
      } catch (err) {
        console.error('Camera error:', err);
        statusEl.textContent = 'Kamerafehler — ↺ zum Neuladen';
        dotEl.className = 'dot err';
      }

      reloadBtn.textContent = '↺';
      reloadBtn.disabled = false;
      isRestarting = false;
    }

    // Camera selector change
    cameraSelect.addEventListener('change', () => {
      initScanner(cameraSelect.value);
      isTorchOn = false;
      torchBtn.classList.remove('torch-on');
      camDropdown.classList.remove('open');
    });

    // Torch toggle
    torchBtn.addEventListener('click', async () => {
      const video = document.querySelector('#reader video');
      if (!video || !video.srcObject) return;
      const track = video.srcObject.getVideoTracks()[0];
      if (!track) return;
      try {
        await track.applyConstraints({ advanced: [{ torch: !isTorchOn }] });
        isTorchOn = !isTorchOn;
        torchBtn.classList.toggle('torch-on', isTorchOn);
      } catch (e) {
        console.log('Torch not supported');
      }
    });

    // Reload camera button (always visible)
    reloadBtn.addEventListener('click', () => {
      if (currentCameraId) initScanner(currentCameraId);
    });

    // Auto-restart camera when phone wakes from standby
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentCameraId) {
        setTimeout(() => initScanner(currentCameraId), 300);
      }
    });

    // Fallback: detect frozen/black video and auto-restart
    setInterval(() => {
      if (document.hidden || isRestarting || !currentCameraId) return;
      const video = document.querySelector('#reader video');
      if (video && (video.paused || video.ended || video.readyState < 2)) {
        initScanner(currentCameraId);
      }
    }, 3000);

  </script>
</body>
</html>
