<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Barcode Scanner</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Dark als Default; Light greift, wenn Browser/System es vorgeben
       (prefers-color-scheme folgt zuerst dem Browser-Override, sonst dem System). */
    :root {
      color-scheme: light dark;
      --bg:#0f0f0f; --fg:#fff; --surface:#1e1e1e; --surface-2:#2a2a2a;
      --surface-3:#3a3a3a; --surface-4:#4a4a4a; --dropdown:#1c1c1e;
      --border:#333; --shadow:rgba(0,0,0,.5);
      /* Quadratische Steuerbuttons (Menü/Zahnrad/Torch/Ton) – skaliert mit der
         Viewport-Breite, aber gedeckelt. Statuszeile = 2/3 dieser Höhe. */
      --btn: clamp(52px, 14vw, 88px);
      --gap: 8px;
      --status-h: calc(var(--btn) * 2 / 3);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f2f2f7; --fg:#1c1c1e; --surface:#fff; --surface-2:#e5e5ea;
        --surface-3:#d8d8dd; --surface-4:#c7c7cc; --dropdown:#fff;
        --border:#d0d0d5; --shadow:rgba(0,0,0,.18);
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      padding: 0;
    }
    .app {
      box-sizing: border-box;
      width: 100%; max-width: 742.5px; height: 100%; margin: 0 auto;
      padding: 7px;
      display: flex; flex-direction: column;
    }

    /* ---- Obere Sektion: Steuerleiste (Kamera-Zeile) + Statuszeile.
       Normal: zwei Grid-Zeilen (top / status). Im Menü-Modus (.app.menu-open)
       kollabiert das Grid zu EINER Zeile mit drei Spalten
       (Menü 52px | Status 1fr | Weiter 52px) — die Statuszeile rückt auf die
       Höhe des Menü-Buttons, der restliche Inhalt darunter wandert mit nach
       oben (per JS-FLIP animiert). Der Weiter-Button (#next-btn) sitzt sonst
       in der Statuszeile; im Menü wandert er (per JS, updateNextBtnPlacement)
       hierher — an die Stelle, an der früher die Lupe stand. Es ist dieselbe
       Schaltfläche in beiden Modi, nur die Position wechselt. ---- */
    .top-section {
      display: grid;
      grid-template-areas: "top" "status";
      grid-template-rows: auto auto;
      row-gap: 7px; column-gap: 7px;
      /* Positionsanker für die Steuer-Elemente, die beim Menü-Übergang per
         position:absolute an alter Stelle ausfaden (s. animateMenu). */
      position: relative;
    }
    .top-bar { grid-area: top; display: flex; gap: 7px; align-items: flex-start; }
    .status-bar { grid-area: status; }
    .app.menu-open .top-section {
      grid-template-areas: "menu status next";
      grid-template-columns: 52px 1fr 52px;
      grid-template-rows: auto;
    }
    .app.menu-open .top-bar { grid-area: menu; }
    .app.menu-open .status-bar { grid-area: status; }
    .app.menu-open .top-section > #next-btn { grid-area: next; width: 52px; height: 52px; font-size: 1.4rem; }
    /* Im Menü-Modus verschwinden Kamerafeld + alle Steuer-Buttons; nur der
       Menü-Button (links) und der Weiter-Button (rechts) bleiben, dazwischen #status. */
    .app.menu-open #gear-btn,
    .app.menu-open #cam-dropdown,
    .app.menu-open #reader,
    .app.menu-open .right-col,
    .app.menu-open #print-btn { display: none; }

    .gear-wrap { position: relative; display: flex; flex-direction: column; gap: 7px; width: 52px; }
    .gear-wrap button { width: 52px; height: 52px; }
    #reader {
      flex: 1 1 auto; min-width: 0; max-width: 610.5px; height: 111px;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 0 0 0 #4caf50; transition: box-shadow .6s ease-out;
      background: #000;
      /* Kamerabild stets formatfüllend und mittig zentriert */
      display: flex; align-items: center; justify-content: center;
    }
    /* Video (und ein evtl. von html5-qrcode eingefügtes Canvas) füllt das Feld
       komplett aus und wird mittig beschnitten — keine Ränder, kein Versatz. */
    #reader video, #reader canvas {
      width: 100% !important; height: 100% !important;
      object-fit: cover; object-position: center center;
      margin: auto !important; left: 0 !important; top: 0 !important;
    }
    #reader.scan-success { box-shadow: 0 0 0 3px #4caf50; transition: none; }
    .right-col { display: flex; flex-direction: column; gap: 7px; width: 52px; }
    .right-col button { width: 52px; height: 52px; }

    button, select {
      border: none; border-radius: 8px; background: var(--surface-2); color: var(--fg);
      font-size: .95rem; cursor: pointer; transition: background .2s;
    }
    button:hover, select:hover { background: var(--surface-3); }
    button:active { background: var(--surface-4); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #gear-btn, #menu-btn { font-size: 1.5rem; }
    .right-col button { font-size: 1.4rem; }
    /* Menü-Button-Icon: drei Balken (Burger), die beim Öffnen zu einem
       Linkspfeil morphen. Oberer + unterer Balken drehen + verschieben sich
       zur Pfeilspitze (Vertex links), der mittlere bleibt als Schaft. Die
       Transform-Transition läuft auf derselben Kurve (.35s cubic-bezier) wie
       das Menü-FLIP in animateMenu — .app.menu-open wird dort synchron mit
       der FLIP-Klasse gesetzt, also bewegen sich Icon und Ansicht gemeinsam.
       Schaft/Spitze treffen sich am linken Ende (x=4) → „←". */
    .menu-icon {
      display: inline-block; position: relative;
      width: 1em; height: 1em; vertical-align: -0.125em;
    }
    .menu-icon .bar {
      position: absolute; left: 4px; width: 16px; height: 2px;
      background: currentColor; border-radius: 1px;
      transform-origin: center;
      transition: transform .35s cubic-bezier(.22,.61,.36,1);
    }
    .menu-icon .bar1 { top: 5px; }   /* Mittelachse y=6  */
    .menu-icon .bar2 { top: 11px; }  /* Mittelachse y=12 (Schaft) */
    .menu-icon .bar3 { top: 17px; }  /* Mittelachse y=18 */
    .app.menu-open .menu-icon .bar1 { transform: translate(-4px, 2px) rotate(-45deg) scaleX(.7071); }
    .app.menu-open .menu-icon .bar3 { transform: translate(-4px, -2px) rotate(45deg) scaleX(.7071); }
    /* bar2 (Schaft) bleibt untransformiert */
    .torch-on { background: #4caf50 !important; }
    .sound-on { background: #4caf50 !important; }
    /* Lupen-Button: sitzt fest in der Warteschlangen-Kopfzeile (neben „Warte-
       schlange", s. .qh-title), wird aber nur im Menü (Peek/Idle-Menü)
       gebraucht — dort blendet er per Opacity dynamisch ein/aus, ohne die
       Zeile selbst zu verschieben (kein JS/Reparenting nötig). */
    #queue-header #search-btn {
      width: 40px; height: 40px; border: none; border-radius: 8px;
      background: var(--surface-2); color: var(--fg); font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; opacity: 0; pointer-events: none;
      transition: opacity .35s cubic-bezier(.22,.61,.36,1), background .2s;
    }
    .app.menu-open #queue-header #search-btn { opacity: 1; pointer-events: auto; }
    #queue-header #search-btn:hover { background: var(--surface-3); }
    #queue-header #search-btn:active { background: var(--surface-4); }

    /* ---- Kamera-Dropdown (über Zahnrad) ---- */
    .cam-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 30;
      display: none; width: 240px;
      background: var(--dropdown); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; box-shadow: 0 8px 24px var(--shadow);
    }
    .cam-dropdown.open { display: flex; gap: 8px; }
    .cam-dropdown select { flex: 1; padding: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cam-dropdown #reload-btn { padding: 10px 12px; font-size: 1.1rem; }

    /* ---- Statuszeile: Höhe passt sich dem Text an (wie die Buchzeilen) ----
       Abstand nach oben kommt vom .top-section-Grid (row-gap), nicht mehr über
       margin-top — sonst verdoppelt er sich. ---- */
    .status-bar { display: flex; gap: 7px; align-items: stretch; }
    .status-bar button { width: 52px; height: auto; font-size: 1.2rem; flex-shrink: 0; }
    #status {
      flex: 1; min-width: 0; max-width: 610.5px; padding: 8px 14px; border-radius: 8px;
      font-size: .9rem; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      white-space: normal; overflow-wrap: normal; word-break: normal; text-align: center;
    }
    .dot { display: none; }
    .dot.ok { background: #4caf50; }
    .dot.err { background: #f44336; }
    /* Ausgemustertes Buch gescannt — deutlich in Rot in der Statuszeile. */
    #status-text.status-book-deleted { color: #f44336; font-weight: 700; }

    /* ---- Name (groß, ohne Box) + Klasse/Bezahlstatus rechtsbündig ---- */
    .name-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 12px 2px 8px; }
    .s-name { font-size: 1.5rem; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.2; }
    .s-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
    .s-form { font-size: 1rem; font-weight: 700; line-height: 1.2; }
    .s-pay  { font-size: .85rem; opacity: .9; text-align: right; }
    .s-pay .paid   { color: #4caf50; }
    .s-pay .unpaid { color: #e69500; }
    .s-pay .wait   { color: #888; }

    /* ---- Queue-Ansicht (Menü/Peek + Idle): „Warteschlange" + Klassen-Reiter.
       #queue-slot fasst Name-row (Schüler-Ansicht) und Queue-Header (Queue-
       Ansicht) zusammen; nur einer ist sichtbar (toggle per .app.queue-view).
       So bleibt der FLIP-Ankerpunkt (Slot) stabil, während der Inhalt wechselt. */
    #queue-slot { position: relative; }
    #queue-header { display: none; margin: 7px 2px 2px; }
    .app.queue-view .name-row { display: none; }
    .app.queue-view #queue-header { display: block; }
    /* „Warteschlange"-Überschrift: gleiche Schrift-Eigenschaften wie der
       Schülername (.s-name) im geladenen Zustand — gleiche Größe/Gewicht,
       keine Kapitälchen/Sperrung/Transparenz. */
    /* Rechtsbündiger Platz für die Lupe (justify-content:space-between,
       s. #queue-header #search-btn oben). */
    .qh-title {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      font-size: 1.5rem; font-weight: 700; line-height: 1.2; margin-bottom: 7px;
    }
    /* Weiter-Button: reine Positions-Transition (kein Ein-/Ausblenden — er
       bleibt immer sichtbar, s. updateNextBtnPlacement in scan.js). */
    #next-btn {
      transition: background .2s, transform .35s cubic-bezier(.22,.61,.36,1);
    }
    /* Klassen-Reiter: horizontal scrollbar, falls sie zu breit werden. Der
       aktive Reiter ist „nach unten offen" (wie im Host): Basis-Linie unter
       der Leiste + 3-seitiger Rahmen ohne Unterkante → geht in die Queue
       darüber über. */
    .queue-tabs {
      display: flex; gap: 4px; overflow-x: auto; scroll-behavior: smooth;
      scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch;
      padding-bottom: 4px; border-bottom: 1px solid var(--border);
      /* Gleicher Abstand zur ersten Warteschlangen-Zeile wie zwischen den
         Steuer-Elementen der Kamera-Zeile (--gap/7px), s. .top-bar. */
      margin-bottom: 7px;
    }
    .queue-tabs::-webkit-scrollbar { height: 4px; }
    .queue-tabs::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }
    .qtab {
      flex: 0 0 auto; scroll-snap-align: start;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: 8px 8px 0 0; font-size: .9rem; font-weight: 600;
      background: transparent; color: var(--fg); border: 1px solid transparent;
      border-bottom: none; cursor: pointer; transition: background .2s, border-color .2s;
      white-space: nowrap;
    }
    .qtab:hover { background: var(--surface-2); }
    .qtab.active { background: var(--surface-2); border-color: var(--border); }
    .qcount {
      font-size: .75rem; background: var(--info-bg, #0a3d6b); color: var(--info, #5ac8fa);
      padding: 1px 7px; border-radius: 10px; font-weight: 600;
    }
    /* Vorschlags-Reiter: eigene Klasse leer, dieser Reiter (weiter rechts) hat
       noch Wartende — „Weiter" springt bei Klick dorthin (s. scan.js,
       suggestedQueueContext). Farbig hervorgehoben statt nur eines Badges,
       damit der Sprung nicht überraschend wirkt. */
    .qtab-suggested { border-color: var(--info, #5ac8fa); color: var(--info, #5ac8fa); }
    .qtab-suggested:hover { background: var(--info-bg, #0a3d6b); }

    /* ---- Bücher-Tabelle (einziger Scroll-Bereich) ---- */
    .book-table-wrap { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .book-row {
      display: grid; grid-template-columns: 5rem 1fr 1.8rem; align-items: center;
      gap: 8px; padding: 8px 10px; margin-bottom: 7px; color: var(--fg);
      border-radius: 8px; border: 2px solid transparent; font-size: .9rem;
      /* FLIP-Animation: nach einem erfolgreichen Scan wandern die Zeilen an
         ihre neue Position, statt sofort zu springen. transform wird nur
         während der Animation gesetzt; ohne Animation bleibt die Zeile ruhig. */
      position: relative;
      transition: transform .5s cubic-bezier(.22, .61, .36, 1);
    }
    .book-row .b-fach { font-weight: 600; }
    .book-row .b-title { overflow: hidden; text-overflow: ellipsis; }
    .book-row .b-icon { text-align: center; font-size: 1.1rem; }
    /* minimalistische Inline-Icons (Lucide-Stil) — skalieren mit der Schriftgröße */
    .ico { width: 1em; height: 1em; vertical-align: -0.125em; flex: none; }
    /* Transparenter Hintergrund, Farbe nur dezent (faint tint + Rand) — in beiden Themes lesbar. */
    .row-vorgemerkt  { background: rgba(230,126,34,.14); border-color: rgba(230,126,34,.55); }
    .row-ausgeliehen { background: rgba(46,125,50,.16);  border-color: rgba(46,125,50,.55); }
    .book-empty { opacity: .4; padding: 14px 4px; font-size: .9rem; }
    /* Warteschlangen-Anzeige (kein Schüler zugewiesen): gleiche Zeilenform
       wie die Bücherliste, aber ohne Farbgebung — transparenter Hintergrund
       und Rand, dafür mit „Aufrufen"-Button statt des Status-Icons. */
    /* Kein Innenabstand oben/unten: der Button ist das höchste Element der
       Zeile, daher entspricht der Zeilen-margin-bottom (7px) direkt dem
       sichtbaren Abstand zwischen den Rändern zweier "Aufrufen"-Buttons. */
    .book-row.queue-row { grid-template-columns: 4.5rem 1fr auto; background: transparent; border-color: transparent; padding-top: 0; padding-bottom: 0; }
    .book-row.queue-row .b-call { display: flex; justify-content: flex-end; align-items: center; }
    .call-btn { padding: 7px 14px; font-size: .85rem; font-weight: 600; border-radius: 8px;
      background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); cursor: pointer; transition: background .2s; }
    .call-btn:hover { background: var(--surface-3); }
    .call-btn:active { background: var(--surface-4); }
    /* Gruppen-Boxen unter der eigentlichen (wartenden) Warteschlange: alle
       gerade aufgerufenen (aktiv) bzw. bereits fertigen Schüler teilen sich
       je EINE gemeinsame Box statt einer Zeile pro Schüler (anders als bei
       den Büchern/wartenden Schülern). Abstand zur vorigen Box/Zeile sowie
       zwischen den Namen innerhalb einer Box: 7px, wie zwischen den
       Steuer-Elementen oben (Menü/Zahnrad/…, s. .top-bar/.gear-wrap). */
    .queue-group {
      display: flex; flex-direction: column; gap: 7px;
      border-radius: 8px; border: 2px solid transparent; padding: 8px 10px;
      margin-bottom: 7px; font-size: .9rem;
    }
    .queue-group-active { background: rgba(33,150,243,.14); border-color: rgba(33,150,243,.55); }
    .queue-group-done   { background: rgba(46,125,50,.16);  border-color: rgba(46,125,50,.55); }
    /* Aktiv-Gruppe: nur Klasse + Name (kein Button). Fertig-Gruppe: Zeilen
       haben zusätzlich den „Aufrufen"-Button (data-student-id gesetzt), daher
       dieselbe 3-Spalten-Aufteilung wie bei den wartenden book-row.queue-row. */
    .queue-group-item { display: grid; grid-template-columns: 4.5rem 1fr; gap: 8px; align-items: center; }
    .queue-group-item[data-student-id] { grid-template-columns: 4.5rem 1fr auto; }
    .queue-group-item .qg-fach { font-weight: 600; }
    .queue-group-item .qg-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .queue-group-item .qg-call { display: flex; justify-content: flex-end; align-items: center; }
    /* Bewegungsreduktion respektieren: FLIP-Transition praktisch sofort. */
    @media (prefers-reduced-motion: reduce) {
      .book-row { transition: transform .01ms !important; }
      .menu-icon .bar { transition: transform .01ms !important; }
      #next-btn { transition: background .2s, transform .01ms; }
      #queue-header #search-btn { transition: background .2s, opacity .01ms; }
    }

    /* ---- Druck-Dialog (Modal) ---- */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100; padding: 20px;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.55);
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      width: 100%; max-width: 420px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px; padding: 20px;
      box-shadow: 0 12px 40px var(--shadow);
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-box h3 { font-size: 1.2rem; font-weight: 700; }
    #book-alert-borrower {
      margin: -6px 0 0; font-weight: 600; color: #c0392b;
      font-size: .95rem;
    }
    .modal-warn {
      background: rgba(230,126,34,.14); border: 1px solid rgba(230,126,34,.55);
      border-radius: 8px; padding: 10px 12px; font-size: .9rem; color: var(--fg);
    }
    .modal-warn ul { margin: 6px 0 0; padding-left: 18px; }
    .modal-warn li { margin: 2px 0; }
    .modal-check { display: flex; align-items: center; gap: 10px; font-size: .95rem; cursor: pointer; user-select: none; }
    .modal-check input { width: 18px; height: 18px; flex: none; cursor: pointer; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .modal-actions button { padding: 12px; font-size: .95rem; width: 100%; }
    .modal-actions .primary { background: #2e7d32; color: #fff; }
    .modal-actions .primary:hover { background: #357a38; }
    .modal-actions .ghost { background: transparent; border: 1px solid #c0392b; color: #c0392b; }
    .modal-actions .ghost:hover { background: rgba(192,57,43,.1); }

    /* ---- Lupen-Suche (Peek-Modus): Panel unter der Statuszeile ----
       Zwei Dropdowns (Klasse + Schüler). Standard eingeklappt (max-height:0,
       opacity:0); per JS wird max-height auf die natürliche Höhe gesetzt und
       die Warteliste darunter per FLIP nach unten gefahren — synchron zur
       opacity/einblend-Transition (.35s, gleiche Kurve wie das Menü). */
    #search-panel {
      display: flex; flex-direction: column; gap: 7px;
      max-height: 0; opacity: 0; overflow: hidden;
      transition: max-height .35s cubic-bezier(.22,.61,.36,1), opacity .35s cubic-bezier(.22,.61,.36,1);
    }
    #search-panel.open { opacity: 1; }
    .search-select {
      width: 100%; padding: 11px 12px; font-size: 1rem; border-radius: 8px;
      background: var(--surface-2); color: var(--fg); border: 1px solid var(--border);
      cursor: pointer;
    }
    /* Gleicher Abstand nach oben (zur Statuszeile) wie zwischen den Dropdowns
       und wie der Menü/Status/Lupe-Spaltenabstand (7px). Als margin-top am
       ERSTEN Dropdown, nicht am Panel: so ist er Teil von scrollHeight, wird
       mit max-height ein/aus animiert und im eingeklappten Zustand abgeschnitten. */
    #search-class { margin-top: 7px; }
    .search-select:hover { background: var(--surface-3); }
    .search-select:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="app">
  <div class="top-section">
    <div class="top-bar">
      <div class="gear-wrap">
        <button id="menu-btn" title="Menü"><span class="menu-icon"><span class="bar bar1"></span><span class="bar bar2"></span><span class="bar bar3"></span></span></button>
        <button id="gear-btn" title="Einstellungen / Kamera"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <div class="cam-dropdown" id="cam-dropdown">
          <select id="camera-select"><option>Kameras laden…</option></select>
          <button id="reload-btn" title="Kamera neu laden"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
        </div>
      </div>
      <div id="reader"></div>
      <div class="right-col">
        <button id="torch-btn" title="Taschenlampe"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6c0 2-2 2-2 4v10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V10c0-2-2-2-2-4V2h12z"/><path d="M6 6h12"/><path d="M12 12h.01"/></svg></button>
        <button id="sound-btn" title="Scan-Ton"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></button>
      </div>
    </div>

    <div class="status-bar">
      <button id="print-btn" title="Leihschein drucken"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>
      <div id="status"><span class="dot" id="dot"></span><span id="status-text">Verbinde…</span></div>
      <button id="next-btn" title="Nächster Schüler"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
    </div>

  </div>

    <!-- Lupen-Suche (nur im Peek-Modus per Lupe geöffnet): zwei Dropdowns
         unter der Statuszeile — oben Klasse, unten Schüler der gewählten
         Klasse. Die Warteliste fährt beim Öffnen nach unten (FLIP), die
         Dropdowns blenden synchron ein. -->
    <div id="search-panel">
      <select id="search-class" class="search-select" disabled><option>Klassen laden …</option></select>
      <select id="search-student" class="search-select" disabled><option>Zuerst Klasse wählen</option></select>
    </div>

    <div id="queue-slot">
      <div class="name-row">
        <div class="s-name" id="s-name"></div>
        <div class="s-meta">
          <div class="s-form" id="s-form"></div>
          <div class="s-pay" id="s-pay"></div>
        </div>
      </div>

      <!-- Queue-Ansicht (Menü/Peek + Idle): Überschrift „Warteschlange" +
           Klassen-Reiter aller im Host offenen Klassen. Bei Überlauf
           horizontal scrollbar. Wird per .app.queue-view eingeblendet
           (Name-row dann ausgeblendet); Auswahl zeigt darunter die Queue. -->
      <div id="queue-header">
        <div class="qh-title">
          <span>Warteschlange</span>
          <!-- Lupen-Button (nur im Menü sichtbar, blendet dynamisch ein/aus):
               geometrisches Icon (Kreis + Strich) im Stil der anderen Line-Icons. -->
          <button id="search-btn" type="button" title="Lupe"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        </div>
        <div id="queue-tabs" class="queue-tabs"></div>
      </div>
    </div>

    <div class="book-table-wrap">
      <div id="book-rows"></div>
    </div>
  </div>

  <!-- Druck-Dialog: Kontrolle + Wahl der 2. Seite vor dem Drucken -->
  <div class="modal-overlay" id="print-modal">
    <div class="modal-box">
      <h3>Leihschein drucken</h3>
      <div class="modal-warn" id="print-warn" style="display:none"></div>
      <label class="modal-check">
        <input type="checkbox" id="slip-second-page">
        Schüler-Leihschein (2. Seite)
      </label>
      <div class="modal-actions">
        <button class="primary" id="modal-print">Drucken</button>
        <button class="primary" id="modal-print-next">Drucken &amp; nächster Schüler</button>
        <button class="ghost" id="modal-cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Buch-Hinweis (ausgemustert / an andere verliehen / an sich selbst
       verliehen): der Helfer schließt dieses Modal selbst (Button) — per Klick
       außerhalb oder beim nächsten Scan geht es ebenfalls zu. Am Host erscheint
       die Meldung bei ausgemustert/verliehen-an-andere bewusst OHNE eigenen
       Schließen-Button (der Helfer-Schließen räumt den Host mit auf); bei
       „an sich selbst verliehen" wird der Host gar nicht erst informiert. -->
  <div class="modal-overlay" id="book-alert-modal">
    <div class="modal-box">
      <h3 id="book-alert-title" style="color:#f44336">Buch-Hinweis</h3>
      <p id="book-alert-text"></p>
      <p id="book-alert-borrower" hidden></p>
      <div class="modal-actions">
        <button class="primary" id="book-alert-close">Schließen</button>
      </div>
    </div>
  </div>

  <!-- Weiter-Dialog: Hinweis auf offene vorgemerkte Bücher vor dem Wechsel -->
  <div class="modal-overlay" id="next-modal">
    <div class="modal-box">
      <h3>Nächster Schüler</h3>
      <div class="modal-warn" id="next-warn"></div>
      <div class="modal-actions">
        <button class="primary" id="modal-next-confirm">Nächster Schüler</button>
        <button class="ghost" id="modal-next-cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Ausleih-Freigabe-Dialog: Bei einem Schüler mit Unstimmigkeit (Nachweis
       fehlt / Rechnung offen) wird vor dem ersten Buch-Scan gefragt, ob für diese
       Person ausgeliehen werden darf. „Ja" merkt die Freigabe bis zum Neuladen
       des Schülers; „Nein" verwirft den Scan, bei erneutem Scannen wird erneut
       gefragt. Rein client-seitig — der Scan wird erst nach „Ja" gesendet, die
       server-seitige Lager-/Anmeldeprüfung + Worker-Eintragung läuft danach wie
       gehabt. Kein DB-/IServ-Schreibzugriff. -->
  <div class="modal-overlay" id="lend-confirm-modal">
    <div class="modal-box">
      <h3>Ausleihe freigeben?</h3>
      <div class="modal-warn" id="lend-warn"></div>
      <div class="modal-actions">
        <button class="primary" id="modal-lend-yes">Ja, ausleihen</button>
        <button class="ghost" id="modal-lend-no">Nicht ausleihen</button>
      </div>
    </div>
  </div>

  <script src="/common.js"></script>
  <script src="/scan-state.js"></script>
  <script src="/scan-ws.js"></script>
  <script src="/scan-render.js"></script>
</body>
</html>
