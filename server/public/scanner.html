<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; opacity: 0.8; }
    #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; }
    #status {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #1e1e1e;
      width: 100%; max-width: 400px;
      text-align: center;
    }
    #last-scan {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 8px;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      width: 100%; max-width: 400px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #4caf50;
      text-align: center;
      min-height: 52px;
      display: flex; align-items: center; justify-content: center;
      word-break: break-all;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #888; }
    .dot.ok { background: #4caf50; }
    .dot.err { background: #f44336; }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      width: 100%; max-width: 400px;
    }
    button, select {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #2a2a2a;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover, select:hover { background: #3a3a3a; }
    button:active { background: #4a4a4a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .torch-on { background: #4caf50 !important; }
    #camera-select { flex: 2; }
  </style>
</head>
<body>
  <h1>Barcode Scanner</h1>
  <div id="reader"></div>
  <div id="status"><span class="dot" id="dot"></span><span id="status-text">Connecting...</span></div>
  <div id="last-scan">—</div>
  <div class="controls">
    <select id="camera-select"><option>Loading cameras...</option></select>
    <button id="torch-btn">Light</button>
  </div>

  <script>
    const statusEl = document.getElementById('status-text');
    const dotEl = document.getElementById('dot');
    const lastScanEl = document.getElementById('last-scan');
    let ws;

    function connect() {
      ws = new WebSocket(`wss://${location.host}/`);
      ws.onopen = () => { dotEl.className = 'dot ok'; statusEl.textContent = 'Connected — ready to scan'; };
      ws.onclose = () => { dotEl.className = 'dot err'; statusEl.textContent = 'Disconnected — retrying...'; setTimeout(connect, 2000); };
      ws.onerror = () => { dotEl.className = 'dot err'; statusEl.textContent = 'Connection error'; };
    }
    connect();

    let lastValue = '', cooldown = false, html5QrCode = null, currentCameraId = null, isTorchOn = false;
    const cameraSelect = document.getElementById('camera-select');
    const torchBtn = document.getElementById('torch-btn');

    // Audio beep for successful scan (initialized on first user interaction)
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx && typeof AudioContext !== 'undefined') {
        audioCtx = new AudioContext();
      }
      if (audioCtx?.state === 'suspended') {
        audioCtx.resume();
      }
    }
    function playBeep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    }

    // Initialize audio on any user tap
    document.addEventListener('touchstart', initAudio, { once: true });
    document.addEventListener('click', initAudio, { once: true });

    function onScanSuccess(value) {
      if (cooldown || value === lastValue) return;
      initAudio(); // ensure audio context is ready
      lastValue = value; cooldown = true;
      setTimeout(() => { cooldown = false; lastValue = ''; }, 2000);
      lastScanEl.textContent = value;
      statusEl.textContent = 'Sent: ' + value;
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'scan', value }));
      if (navigator.vibrate) navigator.vibrate(80);
      playBeep();
    }

    // Load available cameras
    Html5Qrcode.getCameras().then(cameras => {
      cameraSelect.innerHTML = cameras.map((c, i) => `<option value="${c.id}" ${i === 0 ? 'selected' : ''}>${c.label}</option>`).join('');
      currentCameraId = cameras[0]?.id;
      initScanner(currentCameraId);
    }).catch(err => {
      cameraSelect.innerHTML = '<option>No cameras found</option>';
      cameraSelect.disabled = true;
    });

    function initScanner(cameraId) {
      if (html5QrCode) html5QrCode.stop();
      html5QrCode = new Html5Qrcode('reader');
      html5QrCode.start(
        cameraId,
        { fps: 15, qrbox: { width: 300, height: 200 }, aspectRatio: 1.0 },
        onScanSuccess,
        () => {}
      ).then(() => {
        currentCameraId = cameraId;
        // Attempt to get video element for torch control
        const video = document.querySelector('#reader video');
        if (video && video.srcObject) {
          const track = video.srcObject.getVideoTracks()[0];
          const capabilities = track.getCapabilities?.();
          torchBtn.disabled = !(capabilities && capabilities.torch);
        }
      });
    }

    // Camera selector change
    cameraSelect.addEventListener('change', () => {
      initScanner(cameraSelect.value);
      isTorchOn = false;
      torchBtn.classList.remove('torch-on');
    });

    // Torch toggle
    torchBtn.addEventListener('click', async () => {
      const video = document.querySelector('#reader video');
      if (!video || !video.srcObject) return;
      const track = video.srcObject.getVideoTracks()[0];
      if (!track) return;
      try {
        await track.applyConstraints({ advanced: [{ torch: !isTorchOn }] });
        isTorchOn = !isTorchOn;
        torchBtn.classList.toggle('torch-on', isTorchOn);
      } catch (e) {
        console.log('Torch not supported');
      }
    });

  </script>
</body>
</html>
