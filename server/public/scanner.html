<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; opacity: 0.8; }
    #reader { width: 100%; max-width: 320px; border-radius: 12px; overflow: hidden; }
    #status {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #1e1e1e;
      width: 100%; max-width: 320px;
      text-align: center;
    }
    #last-scan {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 8px;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      width: 100%; max-width: 320px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #4caf50;
      text-align: center;
      min-height: 52px;
      display: flex; align-items: center; justify-content: center;
      word-break: break-all;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #888; }
    .dot.ok { background: #4caf50; }
    .dot.err { background: #f44336; }
    .controls {
      margin-top: 16px;
      display: grid;
      gap: 8px;
      width: 100%; max-width: 320px;
    }
    #camera-row { grid-template-columns: 1fr auto auto; }
    #sound-row  { grid-template-columns: 1fr 1fr; }
    button, select {
      width: 100%;
      padding: 12px 10px;
      border: none;
      border-radius: 8px;
      background: #2a2a2a;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button:hover, select:hover { background: #3a3a3a; }
    button:active { background: #4a4a4a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .torch-on { background: #4caf50 !important; }
    .sound-on { background: #4caf50 !important; }
    #reload-btn { padding: 12px 14px; font-size: 1.1rem; width: auto; }
  </style>
</head>
<body>
  <h1>Barcode Scanner</h1>
  <div id="reader"></div>
  <div id="status"><span class="dot" id="dot"></span><span id="status-text">Connecting...</span></div>
  <div id="last-scan">—</div>
  <div class="controls" id="camera-row">
    <select id="camera-select"><option>Loading cameras...</option></select>
    <button id="torch-btn">Light</button>
    <button id="reload-btn" title="Reload camera">&#x21BA;</button>
  </div>
  <div class="controls" id="sound-row">
    <button id="sound-btn">Sound: off</button>
    <button id="sound-test-btn">Test beep</button>
  </div>

  <script>
    const statusEl = document.getElementById('status-text');
    const dotEl = document.getElementById('dot');
    const lastScanEl = document.getElementById('last-scan');
    let ws;

    function connect() {
      ws = new WebSocket(`wss://${location.host}/`);
      ws.onopen = () => { dotEl.className = 'dot ok'; statusEl.textContent = 'Connected — ready to scan'; };
      ws.onclose = () => { dotEl.className = 'dot err'; statusEl.textContent = 'Disconnected — retrying...'; setTimeout(connect, 2000); };
      ws.onerror = () => { dotEl.className = 'dot err'; statusEl.textContent = 'Connection error'; };
    }
    connect();

    let lastValue = '', cooldown = false, html5QrCode = null, currentCameraId = null, isTorchOn = false, isCameraRunning = false, isRestarting = false, soundEnabled = false;
    const cameraSelect = document.getElementById('camera-select');
    const torchBtn = document.getElementById('torch-btn');
    const soundBtn = document.getElementById('sound-btn');
    const reloadBtn = document.getElementById('reload-btn');

    const soundTestBtn = document.getElementById('sound-test-btn');

    // 16-bit WAV: major chord (A5 + C#6 + E6) with fast attack and natural decay
    function makeBeepUrl() {
      const sampleRate = 22050, duration = 0.3;
      const n = Math.floor(sampleRate * duration);
      const buf = new ArrayBuffer(44 + n * 2);
      const v = new DataView(buf);
      const ws = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
      ws(0, 'RIFF'); v.setUint32(4, 36 + n * 2, true); ws(8, 'WAVE');
      ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
      v.setUint16(22, 1, true); v.setUint32(24, sampleRate, true);
      v.setUint32(28, sampleRate * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
      ws(36, 'data'); v.setUint32(40, n * 2, true);
      for (let i = 0; i < n; i++) {
        const t = i / sampleRate;
        const env = Math.min(t / 0.004, 1) * Math.exp(-t * 9);
        const sample = (
          Math.sin(2 * Math.PI * 880  * t) * 0.5 +
          Math.sin(2 * Math.PI * 1108 * t) * 0.3 +
          Math.sin(2 * Math.PI * 1318 * t) * 0.2
        ) * env;
        v.setInt16(44 + i * 2, Math.round(sample * 32767), true);
      }
      return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
    }
    const beepUrl = makeBeepUrl();

    // Pool of 3 pre-created Audio objects — rotating avoids currentTime-reset latency on iOS
    const POOL_SIZE = 3;
    let beepPool = [], poolIdx = 0;

    function playBeep() {
      if (!beepPool.length) return;
      const a = beepPool[poolIdx % POOL_SIZE];
      poolIdx++;
      a.currentTime = 0;
      a.play().catch(() => {});
    }

    soundBtn.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        soundBtn.textContent = 'Sound: on';
        soundBtn.classList.add('sound-on');
        if (!beepPool.length) {
          // Create pool during user gesture to unlock iOS audio pipeline
          for (let i = 0; i < POOL_SIZE; i++) beepPool.push(new Audio(beepUrl));
          poolIdx = 1;
          beepPool[0].play().catch(e => { statusEl.textContent = 'Audio error: ' + e.message; });
        } else {
          playBeep();
        }
      } else {
        soundBtn.textContent = 'Sound: off';
        soundBtn.classList.remove('sound-on');
      }
    });

    soundTestBtn.addEventListener('click', () => {
      const a = new Audio(beepUrl);
      a.play()
        .then(() => { statusEl.textContent = 'Audio: OK'; })
        .catch(e => { statusEl.textContent = 'Audio error: ' + e.message; });
    });

    function onScanSuccess(value) {
      if (cooldown || value === lastValue) return;
      if (soundEnabled) playBeep();
      lastValue = value; cooldown = true;
      setTimeout(() => { cooldown = false; lastValue = ''; }, 2000);
      lastScanEl.textContent = value;
      statusEl.textContent = 'Sent: ' + value;
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'scan', value }));
      if (navigator.vibrate) navigator.vibrate(80);
    }

    // Load available cameras
    Html5Qrcode.getCameras().then(cameras => {
      cameraSelect.innerHTML = cameras.map((c, i) => `<option value="${c.id}" ${i === 0 ? 'selected' : ''}>${c.label}</option>`).join('');
      currentCameraId = cameras[0]?.id;
      initScanner(currentCameraId);
    }).catch(err => {
      cameraSelect.innerHTML = '<option>No cameras found</option>';
      cameraSelect.disabled = true;
    });

    async function initScanner(cameraId) {
      if (isRestarting) return;
      isRestarting = true;
      isCameraRunning = false;
      reloadBtn.disabled = true;
      reloadBtn.textContent = '...';
      statusEl.textContent = 'Starting camera...';

      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
        try { html5QrCode.clear(); } catch (e) {}
        html5QrCode = null;
      }

      html5QrCode = new Html5Qrcode('reader');
      try {
        await html5QrCode.start(
          cameraId,
          { fps: 15, qrbox: { width: 240, height: 160 }, aspectRatio: 1.0 },
          onScanSuccess,
          () => {}
        );
        isCameraRunning = true;
        currentCameraId = cameraId;
        isTorchOn = false;
        torchBtn.classList.remove('torch-on');
        statusEl.textContent = ws && ws.readyState === WebSocket.OPEN ? 'Connected — ready to scan' : 'Reconnecting...';
        const video = document.querySelector('#reader video');
        if (video && video.srcObject) {
          const track = video.srcObject.getVideoTracks()[0];
          const capabilities = track.getCapabilities?.();
          torchBtn.disabled = !(capabilities && capabilities.torch);
        }
      } catch (err) {
        console.error('Camera error:', err);
        statusEl.textContent = 'Camera error — tap ↺ to retry';
        dotEl.className = 'dot err';
      }

      reloadBtn.textContent = '↺';
      reloadBtn.disabled = false;
      isRestarting = false;
    }

    // Camera selector change
    cameraSelect.addEventListener('change', () => {
      initScanner(cameraSelect.value);
      isTorchOn = false;
      torchBtn.classList.remove('torch-on');
    });

    // Torch toggle
    torchBtn.addEventListener('click', async () => {
      const video = document.querySelector('#reader video');
      if (!video || !video.srcObject) return;
      const track = video.srcObject.getVideoTracks()[0];
      if (!track) return;
      try {
        await track.applyConstraints({ advanced: [{ torch: !isTorchOn }] });
        isTorchOn = !isTorchOn;
        torchBtn.classList.toggle('torch-on', isTorchOn);
      } catch (e) {
        console.log('Torch not supported');
      }
    });

    // Reload camera button (always visible)
    reloadBtn.addEventListener('click', () => {
      if (currentCameraId) initScanner(currentCameraId);
    });

    // Auto-restart camera when phone wakes from standby
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentCameraId) {
        setTimeout(() => initScanner(currentCameraId), 300);
      }
    });

    // Fallback: detect frozen/black video and auto-restart
    setInterval(() => {
      if (document.hidden || isRestarting || !currentCameraId) return;
      const video = document.querySelector('#reader video');
      if (video && (video.paused || video.ended || video.readyState < 2)) {
        initScanner(currentCameraId);
      }
    }, 3000);

  </script>
</body>
</html>
